<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CULAK V25 OS</title>
    <style>
        /* Стиль Frutiger Aero: Градиенты, Глянец, Пузырьки */
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0072ff 0%, #00c6ff 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            color: white;
        }

        /* Стеклянная панель (Glassmorphism) */
        .glass-panel {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 30px;
            padding: 40px;
            width: 80%;
            max-width: 600px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            text-align: center;
            position: relative;
            z-index: 10;
        }

        h1 {
            font-weight: 300;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        .status-box {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            font-size: 1.2rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            min-height: 50px;
        }

        /* Анимированные пузырьки */
        .bubble {
            position: absolute;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.6), rgba(255, 255, 255, 0.1));
            border-radius: 50%;
            z-index: 1;
            animation: float 15s infinite ease-in-out;
        }

        @keyframes float {
            0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-100px) scale(1.2); opacity: 0; }
        }
    </style>
</head>
<body>

    <!-- Пузырьки для атмосферы Frutiger Aero -->
    <div class="bubble" style="width: 80px; height: 80px; left: 10%; animation-duration: 12s;"></div>
    <div class="bubble" style="width: 120px; height: 120px; left: 70%; animation-duration: 18s;"></div>
    <div class="bubble" style="width: 50px; height: 50px; left: 40%; animation-duration: 10s;"></div>

    <div class="glass-panel">
        <h1>CULAK V25 <span style="font-weight: bold;">INTERFACE</span></h1>
        <p>Ядро C++ запущено. Текущий статус правды:</p>
        <div class="status-box" id="output">
            Ожидание данных от системы...
        </div>
    </div>

    <script>
        // Функция для обновления текста (в будущем можно подключить к API)
        function updateStatus(text) {
            document.getElementById('output').innerText = text;
        }
        
        // Пример: CULAK говорит правду
        setTimeout(() => {
            updateStatus("Система активна. База знаний загружена.");
        }, 2000);
    </script>
</body>
</html>
